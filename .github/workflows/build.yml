name: Build MeituTweak.dylib

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-14   # Apple Silicon, has Xcode + iOS SDK

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Build dylib (arm64 iOS)
        run: |
          xcrun -sdk iphoneos clang \
            -arch arm64 \
            -dynamiclib \
            -framework Foundation \
            -framework UIKit \
            -fobjc-arc \
            -mios-version-min=14.0 \
            -o MeituTweak.dylib \
            MeituTweak.m
          echo "Build succeeded"
          file MeituTweak.dylib

      - name: Upload dylib
        uses: actions/upload-artifact@v4
        with:
          name: MeituTweak-dylib
          path: MeituTweak.dylib
          retention-days: 30
